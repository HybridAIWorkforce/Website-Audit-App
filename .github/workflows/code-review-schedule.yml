name: Scheduled Code Review

on:
  schedule:
    # Run weekly on Sundays at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --json > audit-report.json || true

      - name: Upload audit report
        uses: actions/upload-artifact@v7
        with:
          name: npm-audit-report
          path: audit-report.json

  code-quality-check:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint > lint-report.txt 2>&1 || true

      - name: Run type check
        run: npm run type-check > typecheck-report.txt 2>&1 || true

      - name: Upload quality reports
        uses: actions/upload-artifact@v7
        with:
          name: code-quality-reports
          path: |
            lint-report.txt
            typecheck-report.txt

  outdated-dependencies:
    name: Check Outdated Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check outdated packages
        run: npm outdated --json > outdated-report.json 2>&1 || true

      - name: Upload outdated report
        uses: actions/upload-artifact@v7
        with:
          name: outdated-dependencies-report
          path: outdated-report.json

  create-issue:
    name: Create Review Issue
    runs-on: ubuntu-latest
    needs: [dependency-review, code-quality-check, outdated-dependencies]
    if: always()
    permissions:
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create or update review issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = '📋 Weekly Code Review Summary';
            const date = new Date().toISOString().split('T')[0];
            const body = `## Weekly Code Review Summary
            
            **Date:** ${date}
            
            ### Automated Checks Completed
            
            - [x] Dependency security audit
            - [x] Code quality analysis
            - [x] Outdated dependencies check
            
            ### Results
            
            | Check | Status |
            |-------|--------|
            | Dependency Review | ${{ needs.dependency-review.result }} |
            | Code Quality Check | ${{ needs.code-quality-check.result }} |
            | Outdated Dependencies | ${{ needs.outdated-dependencies.result }} |
            
            ### Action Items
            
            - [ ] Review security audit results
            - [ ] Update outdated dependencies if necessary
            - [ ] Address any new linting issues
            
            ---
            *This issue was automatically generated by the scheduled code review workflow.*`;
            
            // Find existing open review issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'code-review'
            });
            
            const existingIssue = issues.data.find(issue => issue.title === title);
            
            if (existingIssue) {
              // Update existing issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: body
              });
              console.log(`Updated issue #${existingIssue.number}`);
            } else {
              // Create new issue
              const newIssue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['code-review', 'automated']
              });
              console.log(`Created issue #${newIssue.data.number}`);
            }
